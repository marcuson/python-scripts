    subfolders: true
    tags: ["casa"]
    filter_mode: all
    filters:
      - extension: pdf
      - filecontent: "Ricevuta pagamento bollo auto"
      - filecontent: "EP165JK"
      - filecontent: 'Data pagamento\s+(?P<date>\d{2}/\d{2}/\d{4})'
      - python: |
          from organizemarc.filters.date import date_to_lex
          return { "date_lex": date_to_lex(filecontent["date"]) }
    actions:
