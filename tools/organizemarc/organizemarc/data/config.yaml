  # ?Doc. ricorrenti - Legge 104
  # ?Doc. ricorrenti - Salute

  # Doc. ricorrenti - TARI
  - name: "Doc. ricorrenti - TARI"
    enabled: *all_enabler
    targets: files
    locations: *in_folder
    subfolders: true
    tags: ["casa"]
    filter_mode: all
    filters:
      - extension: pdf
      - filecontent: "TRIB.LOCALI"
      - filecontent: "3944"
      - filecontent: "TEFA"
      - filecontent: 'DATA DEL VERSAMENTO\s+(?P<date>\d{2}\s+\d{2}\s+\d{4})'
      - python: |
          from organizemarc.filters.date import date_to_lex
          date = "/".join(filecontent["date"].split())
          return { "date_lex": date_to_lex(date) }
    actions:
      - move: "{env.ORGANIZE_ROOT_DIR}/out/DocRicorrenti/TARI/{python.date_lex}-pagamento-tari.pdf"

