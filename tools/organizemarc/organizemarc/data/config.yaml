  # Doc. ricorrenti - Banca
  - name: "Doc. ricorrenti - Banca - Documenti"
    enabled: *all_enabler
    targets: files
    locations: *in_folder
    subfolders: true
    tags: ["banca"]
    filter_mode: all
    filters:
      - extension: pdf
      - name:
          contains:
            - contabile movimenti
            - estratto conto
            - rendiconto titoli
            - proposta di modifica unilaterale
          case_sensitive: false
      - regex: '^(?P<date>\d{2}_\d{2}_\d{4})_8364_(?P<name_rest>.*)$'
      - python: |
          from organizemarc.filters.mps import mps_leo
          return mps_leo(path, date_ita=regex["date"])
    actions:
      - move: "{env.ORGANIZE_ROOT_DIR}/out/DocRicorrenti/Banca/{python.date_lex}-8364-{regex.name_rest}"

  # Doc. ricorrenti - Case - Acqua
  - name: "Doc. ricorrenti - Case - Acqua (bollette) (afrbr148)"
    enabled: *all_enabler
    targets: files
    locations: *in_folder
    subfolders: true
    tags: ["casa", "bolletta", "acqua", "afrbr148"]
    filter_mode: all
    filters:
      - extension: pdf
      - name:
          startswith:
            - 0029365940_0000271574_
          case_sensitive: false
      - filecontent: "Scadenza.*(?P<due_date>[0-9]{2}/[0-9]{2}/[0-9]{4}).*Autolettura"
      - python:
          code: |
            from organizemarc.filters.date import date_to_lex
            return {"due_date_lex": date_to_lex(filecontent["due_date"])}
    actions:
      - move: "{env.ORGANIZE_ROOT_DIR}/out/DocRicorrenti-afrbr148/Acqua/{python.due_date_lex}-acqua-afrbr148.pdf"

  - name: "Doc. ricorrenti - Case - Acqua (bollette) (monpol16)"
    enabled: *all_enabler
    targets: files
    locations: *in_folder
    subfolders: true
    tags: ["casa", "bolletta", "acqua", "monpol16"]
    filter_mode: all
    filters:
