# organize configuration file
# https://organize.readthedocs.io

in_folder: &in_folder
  - "{env.ORGANIZE_ROOT_DIR}/in"
all_enabler: &all_enabler true

bonifico_poste_date: &bonifico_poste_date 'da te effettuato il giorno (?P<date>\d{2}/\d{2}/\d{4}) alle ore'

rules:
  # Cicci - Banca
  - name: "Cicci - Banca (movimenti CC)"
    enabled: *all_enabler
    targets: files
    locations: *in_folder
    subfolders: true
    tags: ["cicci"]
    filter_mode: all
    filters:
      - extension: pdf
      - filecontent: "MONTE DEI PASCHI DI SIENA"
      - filecontent: "Contabile al"
      - regex: '^\d{20}.pdf$'
      - python: |
          from organizemarc.filters.mps import mps_cicci_movimenti_cc
          return mps_cicci_movimenti_cc(path)
    actions:
      - move: "{env.ORGANIZE_ROOT_DIR}/out/Cicci/Banca/{python.date_lex}-movimenti-cc-cicci.pdf"

  - name: "Cicci - Banca (estratto conto)"
    enabled: *all_enabler
    targets: files
    locations: *in_folder
    subfolders: true
    tags: ["cicci"]
    filter_mode: all
    filters:
      - extension: pdf
      - filecontent: "MONTE DEI PASCHI DI SIENA"
      - filecontent: "Estratto Conto"
      - regex: '^\d{20}.pdf$'
      - python: |
          from organizemarc.filters.mps import mps_cicci_estratto_conto
          return mps_cicci_estratto_conto(path)
    actions:
      - move: "{env.ORGANIZE_ROOT_DIR}/out/Cicci/Banca/{python.date_lex}-estratto-conto-cicci.pdf"

  - name: "Cicci - Banca (doc. sintesi)"
    enabled: *all_enabler
    targets: files
    locations: *in_folder
    subfolders: true
    tags: ["cicci"]
    filter_mode: all
    filters:
      - extension: pdf
      - filecontent: "MONTE DEI PASCHI DI SIENA"
      - filecontent: "Documento di Sintesi"
      - regex: '^\d{20}.pdf$'
      - python: |
          from organizemarc.filters.mps import mps_cicci_doc_sintesi
          return mps_cicci_doc_sintesi(path)
    actions:
      - move: "{env.ORGANIZE_ROOT_DIR}/out/Cicci/Banca/{python.date_lex}-doc-sintesi-cicci.pdf"

  - name: "Cicci - Banca (comunicazioni)"
    enabled: *all_enabler
    targets: files
    locations: *in_folder
    subfolders: true
    tags: ["cicci"]
    filter_mode: all
    filters:
      - extension: pdf
      - filecontent: "MONTE DEI PASCHI DI SIENA"
      - filecontent: "Oggetto:"
      - regex: '^\d{20}.pdf$'
      - python: |
          from organizemarc.filters.mps import mps_cicci_comunicazione
          return mps_cicci_comunicazione(path)
    actions:
      - move: "{env.ORGANIZE_ROOT_DIR}/out/Cicci/Banca/{python.date_lex}-comunicazione-cicci.pdf"

  # Affitti - Dominio
  - name: "Affitti - Dominio (monpol16)"
    enabled: *all_enabler
    targets: files
    locations: *in_folder
    subfolders: true
    tags: ["affitto", "monpol16"]
    filter_mode: all
    filters:
      - extension: pdf
      - filecontent: "Netsons"
      - filecontent: "ilsoggiornodelpoliziano.it"
      - filecontent: 'Data scadenza\:\s+(?P<due_date_ita>[0-9]{2}/[0-9]{2}/[0-9]{4})'
      - python: |
          from organizemarc.filters.date import date_to_lex
          return { "date_lex": date_to_lex(filecontent["due_date_ita"]) }
    actions:
      - move: "{env.ORGANIZE_ROOT_DIR}/out/Affitti-monpol16/Dominio/{python.date_lex}-dominio-monpol16.pdf"

  # Affitti - Estintore
  - name: "Affitti - Estintore (avviso) (monpol16)"
    enabled: *all_enabler
    targets: files
    locations: *in_folder
    subfolders: true
    tags: ["affitto", "monpol16"]
    filter_mode: all
    filters:
      - extension: pdf
      - filecontent: "CONTROLLO PERIODICO ESTINTORE PORTATILE"
      - filecontent: 'Scadenza.*(?P<due_date>\d{2}/\d{2}/\d{4}).*Totale'
      - python: |
          from organizemarc.filters.date import date_to_lex
          return { "date_lex": date_to_lex(filecontent["due_date"]) }
    actions:
      - move: "{env.ORGANIZE_ROOT_DIR}/out/Affitti-monpol16/Pulizie/{python.date_lex}-estintore-fattura-avviso-monpol16.pdf"

  - name: "Affitti - Estintore (pagamento) (monpol16)"
    enabled: *all_enabler
    targets: files
    locations: *in_folder
    subfolders: true
    tags: ["affitto", "monpol16"]
    filter_mode: all
    filters:
      - extension: pdf
      - regex: '^Ricevuta_Bonifico_SEPA_Postagiro_\d{8}.*\.pdf$'
      - filecontent: "Centro Sicurezza"
      - filecontent: *bonifico_poste_date
      - python: |
          from organizemarc.filters.date import date_to_lex
          return { "date_lex": date_to_lex(filecontent["date"]) }
    actions:
      - move: "{env.ORGANIZE_ROOT_DIR}/out/Affitti-monpol16/Estintore/{python.date_lex}-estintore-fattura-pagamento-monpol16.pdf"

  # Affitti - Imposta soggiorno - Agenzia entrate
  - name: "Affitti - Imp. soggiorno - AdE (monpol16)"
    enabled: *all_enabler
    targets: files
    locations: *in_folder
    subfolders: true
    tags: ["affitto", "monpol16"]
    filter_mode: all
    filters:
      - extension: pdf
      - name
      - filecontent: "(?P<header>Servizio erogato dal Dipartimento delle Finanze)"
      - python: |
          from organizemarc.filters.ade import ade_soggiorno
          return ade_soggiorno(path)
    actions:
      - move: "{env.ORGANIZE_ROOT_DIR}/out/Affitti-monpol16/Imposta soggiorno/Agenzia entrate/{python.date_lex}-{name}.pdf"

  # Affitti - Imposta soggiorno - Comune
  - name: "Affitti - Imp. soggiorno - Comune (avviso pagamento) (monpol16)"
    enabled: *all_enabler
    targets: files
    locations: *in_folder
    subfolders: true
    tags: ["affitto", "monpol16"]
    filter_mode: all
    filters:
      - extension: pdf
      - name:
          contains: 052015LTN0313
          case_sensitive: false
      - filecontent: 'per il periodo (?P<month_start>[a-zA-Z]+)\+-\+(?P<month_end>[a-zA-Z]+)\s+-\s+(?P<year>\d{4})'
      - python: |
          from organizemarc.filters.montepulciano import montepulciano_imposta_soggiorno_avviso
          return montepulciano_imposta_soggiorno_avviso(
            path,
            month_start=filecontent["month_start"],
            month_end=filecontent["month_end"],
            year=filecontent["year"])
    actions:
      - move: "{env.ORGANIZE_ROOT_DIR}/out/Affitti-monpol16/Imposta soggiorno/Comune/{python.date_lex}-avviso-pagamento-{name}-monpol16.pdf"

  - name: "Affitti - Imp. soggiorno - Comune (ricevuta pagamento) (monpol16)"
    enabled: *all_enabler
    targets: files
    locations: *in_folder
    subfolders: true
    tags: ["affitto", "monpol16"]
    filter_mode: all
    filters:
      - extension: pdf
      - regex: '^Ricevuta_PagoPA_(?P<date>\d{8})\.pdf$'
      - filecontent: 'PER IL PERIODO (?P<month_start>[a-zA-Z]+)\s+-\s+(?P<month_end>[a-zA-Z]+)\s+-\s+(?P<year>\d{4})'
      - python: |
          from organizemarc.filters.montepulciano import montepulciano_imposta_soggiorno_ricevuta
          return montepulciano_imposta_soggiorno_ricevuta(
            path,
            month_start=filecontent["month_start"],
            month_end=filecontent["month_end"],
            year=filecontent["year"])
    actions:
      - move: "{env.ORGANIZE_ROOT_DIR}/out/Affitti-monpol16/Imposta soggiorno/Comune/{python.date_lex}-ricevuta-pagamento-monpol16.pdf"

  # ?Affitti - Imposta soggiorno - Ospiti
  # ?Affitti - Istat
  # ?Affitti - Motourist

