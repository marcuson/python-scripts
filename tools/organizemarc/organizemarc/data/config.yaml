      - name:
          startswith:
            - 0035490074_0000271574_
          case_sensitive: false
      - filecontent: "Scadenza.*(?P<due_date>[0-9]{2}/[0-9]{2}/[0-9]{4}).*Autolettura"
      - python:
          code: |
            from organizemarc.filters.date import date_to_lex
            return {"due_date_lex": date_to_lex(filecontent["due_date"])}
    actions:
      - move: "{env.ORGANIZE_ROOT_DIR}/out/DocRicorrenti-monpol16/Acqua/{python.due_date_lex}-acqua-monpol16.pdf"

  # Doc. ricorrenti - Case - Altro
  - name: "Doc. ricorrenti - Altro - Dominio marcuson.boo"
    enabled: *all_enabler
    targets: files
    locations: *in_folder
    subfolders: true
    tags: ["casa"]
    filter_mode: all
    filters:
      - extension: pdf
      - name:
          contains: cloudflare
          case_sensitive: false
      - filecontent: "marcuson.boo"
      - filecontent: 'Date due\s*(?P<due_date_eng>[a-zA-Z]+ \d+, \d{4})'
      - python: |
          from organizemarc.filters.date import date_to_lex
          return { "date_lex": date_to_lex(filecontent["due_date_eng"], in_format="%B %d, %Y", loc="en_US.UTF-8") }
    actions:
      - move: "{env.ORGANIZE_ROOT_DIR}/out/DocRicorrenti/Altro/{python.date_lex}-dominio-marcuson.pdf"

