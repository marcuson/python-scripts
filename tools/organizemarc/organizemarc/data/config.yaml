      - python: |
          from organizemarc.filters.tim import tim
          return tim(path, "afrbr148", place=filecontent["place"], due_date_ita=filecontent["due_date_ita"])
    actions:
      - move: "{env.ORGANIZE_ROOT_DIR}/out/DocRicorrenti-afrbr148/Internet-Telefono/{python.due_date_lex}-telefono-afrbr148.pdf"

