[project]
name = "hellopython"
version = "0.2.0"
description = "Hello Python!"
requires-python = ">=3.12"
dependencies = [
    "yachalk>=0.1.8",
]

[project.scripts]
hellopython = "hellopython.cli:main"

[build-system]
requires = ["uv-build>=0.11.28,<0.12"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-root = ""
source-exclude = [".venv"]
wheel-exclude = [".venv"]
